name: Deploy Demo to GitHub Pages
run-name: ${{ github.actor }} deploy demo on ${{ github.repository }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install library dependencies
        run: npm ci

      - name: Run tests (gate the deploy)
        run: npm test # a failing test stops the deploy

      - name: Build library
        run: npm run build # produces ./dist, which the demo's tsconfig paths point to

      - name: Install demo dependencies
        run: npm ci # installs @softwarity/draw-adapter from npm (the path fallback)
        working-directory: demo

      # The demo's tsconfig paths map `@softwarity/sigmet-draw` → ../dist (this repo's
      # build) and `@softwarity/draw-adapter` → sibling-or-npm (here: npm, no sibling in
      # CI), with leaflet/ol/maplibre forced to the demo's node_modules → single copy.
      - name: Build demo for GitHub Pages
        run: npm run build -- --base-href /sigmet-draw/
        working-directory: demo

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './demo/dist/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
